<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Aura</title>
    <link rel="stylesheet" href="style.css?v=11">
    <!-- Google Fonts: Inter and Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- Menú Lateral -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <img src="logo.jpg" alt="Logo L1deres" class="sidebar-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="logo-fallback" style="display: none;">
                        <i class='bx bx-image-alt'></i>
                        <span>Logo</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-btn active">
                    <i class='bx bx-grid-alt'></i>
                    <span>Panel Principal</span>
                </button>
                <button class="nav-btn">
                    <i class='bx bx-map-alt'></i>
                    <span>Planos</span>
                </button>
                <button class="nav-btn">
                    <i class='bx bx-car'></i>
                    <span>Vehículos</span>
                </button>
                <button class="nav-btn">
                    <i class='bx bx-line-chart'></i>
                    <span>Métricas</span>
                </button>
                <button class="nav-btn">
                    <i class='bx bx-cog'></i>
                    <span>Configuración</span>
                </button>
                <button class="nav-btn">
                    <i class='bx bx-help-circle'></i>
                    <span>Ayuda</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <p>&copy; 2026 Aura. Todos los derechos reservados.</p>
            </div>
        </aside>

        <!-- Área Principal (Paño Limpio) -->
        <main class="main-content">
            <div class="controls-header" style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: flex-end;">
                <button id="btn-ingresar-lavado" style="padding: 10px 20px; background: #0ea5e9; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s;">
                    <i class='bx bx-car'></i> Ingresar Solo Lavado
                </button>
                <button id="btn-ingresar-secado" style="padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s;">
                    <i class='bx bx-car'></i> Ingresar Solo Interior
                </button>
                <button id="btn-ingresar-completo" style="padding: 10px 20px; background: #f59e0b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s;">
                    <i class='bx bx-car'></i> Ingresar Lavado + Interior
                </button>
            </div>
            <div class="canvas-area" id="canvas-area">
                <!-- Aquí se generan los 48 boxes (8x6) -->
                <div class="canvas-grid" id="canvas-grid">
                    <!-- Los boxes se agregarán con Javascript -->
                </div>
            </div>
        </main>

    </div>

    <script src="script.js?v=10"></script>
</body>
</html>
